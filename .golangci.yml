version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - copyloopvar
    - durationcheck
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - nolintlint
    - staticcheck
    - unconvert
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    govet:
      enable:
        - appends
        - asmdecl
        - assign
        - atomic
        - bools
        - buildtag
        - cgocall
        - composites
        - copylocks
        - defers
        - directive
        - errorsas
        - framepointer
        - httpresponse
        - ifaceassert
        - loopclosure
        - lostcancel
        - nilfunc
        - printf
        - shift
        - sigchanyzer
        - slog
        - stdmethods
        - stringintconv
        - structtag
        - testinggoroutine
        - tests
        - timeformat
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedresult
    gosec:
      excludes:
        - G204
    nolintlint:
      require-specific: true
      require-explanation: true

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
